{#-
  PhD subpage article template — dark cosmic style
  Lets MkDocs render markdown normally; just applies the cosmic theme.
-#}
{% extends "main.html" %}

{% block tabs %}
  {{ super() }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
    /* ── Design tokens ── */
    :root {
      --c-bg:       #05050f;
      --c-surface:  rgba(255,255,255,.04);
      --c-border:   rgba(255,255,255,.08);
      --c-blue:     #4a9eff;
      --c-blue-dim: rgba(74,158,255,.12);
      --c-gold:     #ffd54f;
      --c-gold-dim: rgba(255,213,79,.12);
      --c-text:     #e8e8f0;
      --c-muted:    rgba(232,232,240,.55);
      --radius:     10px;
      --ease:       cubic-bezier(.4,0,.2,1);
    }

    /* ── Base overrides ── */
    body,
    .md-main,
    .md-main__inner,
    [data-md-color-scheme] {
      background: var(--c-bg) !important;
      color: var(--c-text) !important;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif !important;
    }

    /* Sidebar: left nav (keep visible, style dark) */
    .md-sidebar--primary,
    .md-sidebar--primary .md-sidebar__scrollwrap {
      background: rgba(5,5,15,.95) !important;
      border-right: 1px solid var(--c-border);
    }
    .md-nav__title { color: var(--c-muted) !important; font-size: .72rem; letter-spacing: .12em; text-transform: uppercase }
    .md-nav__link { color: var(--c-muted) !important; font-size: .84rem }
    .md-nav__link:hover,
    .md-nav__link--active { color: var(--c-blue) !important }
    .md-nav__item--active > .md-nav__link { color: var(--c-blue) !important; font-weight: 600 }
    .md-nav__item--nested > .md-nav__link::after { color: var(--c-muted) }

    /* Hide right TOC (table of contents) sidebar */
    @media screen and (min-width: 60em) { .md-sidebar--secondary { display: none } }

    /* ── Content area ── */
    .md-content {
      background: transparent !important;
    }
    .md-content__inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* ── Article meta bar ── */
    .md-content__inner > h1:first-child {
      font-family: 'DM Sans', sans-serif !important;
      font-size: clamp(1.7rem, 3.5vw, 2.6rem) !important;
      font-weight: 800 !important;
      color: #fff !important;
      line-height: 1.2 !important;
      margin: 0 0 1.5rem !important;
      padding-top: 0 !important;
      border: none !important;
    }
    .md-content__inner > h1:first-child::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--c-blue), var(--c-gold));
      border-radius: 2px;
      margin-top: .8rem;
    }

    /* ── Headings ── */
    .md-typeset h1 {
      font-family: 'DM Sans', sans-serif !important;
      font-size: clamp(1.7rem, 3.5vw, 2.6rem) !important;
      font-weight: 800 !important;
      color: #fff !important;
      line-height: 1.2 !important;
      margin-bottom: 1rem !important;
      border: none !important;
      padding: 0 !important;
    }
    .md-typeset h2 {
      font-family: 'DM Sans', sans-serif !important;
      font-size: 1.35rem !important;
      font-weight: 800 !important;
      color: #fff !important;
      border: none !important;
      padding: 0 !important;
      margin-top: 2.8rem !important;
      margin-bottom: .75rem !important;
    }
    .md-typeset h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 1.2em;
      background: var(--c-blue);
      border-radius: 2px;
      margin-right: .65rem;
      vertical-align: middle;
      position: relative;
      top: -.05em;
    }
    .md-typeset h3 {
      font-size: 1.1rem !important;
      font-weight: 700 !important;
      color: var(--c-text) !important;
      margin-top: 2rem !important;
      margin-bottom: .5rem !important;
    }
    .md-typeset h4 { color: var(--c-muted) !important; font-weight: 600 !important }

    /* ── Paragraphs & links ── */
    .md-typeset p {
      color: var(--c-muted) !important;
      line-height: 1.85 !important;
      font-size: 1rem !important;
      margin-bottom: 1rem !important;
    }
    .md-typeset strong { color: var(--c-text) !important }
    .md-typeset em { color: var(--c-blue) !important; font-style: italic }
    .md-typeset a { color: var(--c-blue) !important; text-decoration: none !important }
    .md-typeset a:hover { text-decoration: underline !important }

    /* ── Blockquotes ── */
    .md-typeset blockquote {
      border-left: 3px solid var(--c-blue) !important;
      background: rgba(74,158,255,.06) !important;
      border-radius: 0 var(--radius) var(--radius) 0 !important;
      padding: 1rem 1.4rem !important;
      margin: 1.5rem 0 !important;
      color: var(--c-muted) !important;
      font-style: italic !important;
    }
    .md-typeset blockquote p { color: var(--c-muted) !important; margin-bottom: .4rem !important }
    .md-typeset blockquote p:last-child { margin-bottom: 0 !important }

    /* ── Admonitions (??? note, !!! quote, etc.) ── */
    .md-typeset .admonition,
    .md-typeset details {
      background: var(--c-surface) !important;
      border: 1px solid var(--c-border) !important;
      border-left: 3px solid var(--c-blue) !important;
      border-radius: var(--radius) !important;
      box-shadow: none !important;
      margin: 1.5rem 0 !important;
    }
    .md-typeset .admonition-title,
    .md-typeset summary {
      background: rgba(74,158,255,.08) !important;
      color: var(--c-text) !important;
      font-weight: 700 !important;
      font-size: .88rem !important;
      padding: .7rem 1rem !important;
      border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0 !important;
    }
    .md-typeset .admonition-title::before,
    .md-typeset summary::before { display: none !important }
    .md-typeset details > summary { list-style: none }
    .md-typeset details > summary::-webkit-details-marker { display: none }
    .md-typeset .admonition p,
    .md-typeset details p {
      padding: 0 1rem !important;
      color: var(--c-muted) !important;
    }
    .md-typeset .admonition > *:last-child,
    .md-typeset details > *:last-child { padding-bottom: 1rem }

    /* Quote admonition gets gold accent */
    .md-typeset .admonition.quote,
    .md-typeset details.quote {
      border-left-color: var(--c-gold) !important;
    }
    .md-typeset .admonition.quote .admonition-title,
    .md-typeset details.quote summary {
      background: rgba(255,213,79,.08) !important;
      color: var(--c-gold) !important;
    }

    /* ── Code blocks ── */
    .md-typeset code {
      background: rgba(74,158,255,.1) !important;
      color: var(--c-blue) !important;
      border-radius: 4px !important;
      font-size: .88em !important;
      padding: .1em .35em !important;
    }
    .md-typeset pre {
      background: rgba(255,255,255,.04) !important;
      border: 1px solid var(--c-border) !important;
      border-radius: var(--radius) !important;
    }
    .md-typeset pre code {
      background: transparent !important;
      color: var(--c-text) !important;
      padding: 0 !important;
    }

    /* ── Lists ── */
    .md-typeset ul li,
    .md-typeset ol li {
      color: var(--c-muted) !important;
      margin-bottom: .35rem !important;
    }
    .md-typeset ul li::marker { color: var(--c-blue) }
    .md-typeset ol li::marker { color: var(--c-gold) }

    /* ── Definition lists (dl) ── */
    .md-typeset dt { color: var(--c-text) !important; font-weight: 700 }
    .md-typeset dd { color: var(--c-muted) !important }

    /* ── Tables ── */
    .md-typeset table {
      border-collapse: collapse !important;
      width: 100% !important;
    }
    .md-typeset th {
      background: rgba(74,158,255,.1) !important;
      color: var(--c-text) !important;
      border: 1px solid var(--c-border) !important;
      padding: .6rem 1rem !important;
      font-size: .82rem !important;
      text-transform: uppercase !important;
      letter-spacing: .06em !important;
    }
    .md-typeset td {
      border: 1px solid var(--c-border) !important;
      color: var(--c-muted) !important;
      padding: .55rem 1rem !important;
      font-size: .9rem !important;
    }
    .md-typeset tr:hover td { background: rgba(255,255,255,.03) !important }

    /* ── Horizontal rule ── */
    .md-typeset hr {
      border: none !important;
      border-top: 1px solid var(--c-border) !important;
      margin: 2.5rem 0 !important;
    }

    /* ── Images ── */
    .md-typeset img {
      border-radius: var(--radius) !important;
      max-width: 100% !important;
    }

    /* ── Article article-meta pill (keywords / author info) ── */
    .md-typeset p strong:only-child {
      display: block;
    }
    /* Keywords / citation block styling */
    .md-typeset > p:nth-child(2),
    .md-typeset > p:nth-child(3) {
      font-size: .88rem !important;
      color: var(--c-muted) !important;
    }

    /* ── Footer ── */
    .md-footer {
      background: rgba(5,5,15,.98) !important;
      border-top: 1px solid var(--c-border) !important;
      color: var(--c-muted) !important;
    }
    .md-footer-meta { background: transparent !important }
    .md-footer__link { color: var(--c-muted) !important }
    .md-footer__link:hover { color: var(--c-blue) !important }
    .md-footer__title { color: var(--c-text) !important }

    /* ── Scrollbar ── */
    * { scrollbar-color: rgba(74,158,255,.25) transparent; scrollbar-width: thin }

    /* ── Footnotes ── */
    .md-typeset .footnote { font-size: .82rem !important; color: var(--c-muted) !important }
    .md-typeset .footnote-ref { color: var(--c-blue) !important }

    /* ── Search highlight ── */
    .md-typeset mark { background: rgba(255,213,79,.25) !important; color: var(--c-text) !important }
  </style>

{% endblock %}
