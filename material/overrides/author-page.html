{#-
  Individual author biography page — dark cosmic style
  CSS overlay on MkDocs markdown renderer; keeps sidebar nav.
-#}
{% extends "main.html" %}

{% block tabs %}
  {{ super() }}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --c-bg:       #05050f;
      --c-surface:  rgba(255,255,255,.04);
      --c-border:   rgba(255,255,255,.08);
      --c-blue:     #4a9eff;
      --c-blue-dim: rgba(74,158,255,.12);
      --c-gold:     #ffd54f;
      --c-gold-dim: rgba(255,213,79,.12);
      --c-text:     #e8e8f0;
      --c-muted:    rgba(232,232,240,.55);
      --radius:     10px;
      --ease:       cubic-bezier(.4,0,.2,1);
    }

    /* ── Base ── */
    body, .md-main, .md-main__inner, [data-md-color-scheme] {
      background: var(--c-bg) !important;
      color: var(--c-text) !important;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif !important;
    }

    /* ── Left sidebar nav ── */
    .md-sidebar--primary,
    .md-sidebar--primary .md-sidebar__scrollwrap {
      background: rgba(5,5,15,.95) !important;
      border-right: 1px solid var(--c-border);
    }
    .md-nav__title { color: var(--c-muted) !important; font-size: .72rem; letter-spacing: .12em; text-transform: uppercase }
    .md-nav__link  { color: var(--c-muted) !important; font-size: .84rem }
    .md-nav__link:hover, .md-nav__link--active { color: var(--c-blue) !important }
    .md-nav__item--active > .md-nav__link { color: var(--c-blue) !important; font-weight: 600 }

    /* Hide right TOC */
    @media screen and (min-width: 60em) { .md-sidebar--secondary { display: none } }

    /* ── Content area ── */
    .md-content { background: transparent !important }
    .md-content__inner { max-width: 820px; margin: 0 auto; padding: 2.5rem 2rem 5rem }

    /* ── H1 — author name ── */
    .md-typeset h1 {
      font-family: 'DM Sans', sans-serif !important;
      font-size: clamp(1.9rem,4vw,3rem) !important;
      font-weight: 800 !important;
      color: #fff !important;
      line-height: 1.15 !important;
      margin: 0 0 1.2rem !important;
      border: none !important; padding: 0 !important;
    }
    .md-typeset h1::after {
      content: '';
      display: block; width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--c-gold), var(--c-blue));
      border-radius: 2px; margin-top: .7rem;
    }

    /* ── H2 — biography sections ── */
    .md-typeset h2 {
      font-family: 'DM Sans', sans-serif !important;
      font-size: 1.25rem !important;
      font-weight: 800 !important;
      color: #fff !important;
      border: none !important; padding: 0 !important;
      margin-top: 2.5rem !important; margin-bottom: .6rem !important;
    }
    .md-typeset h2::before {
      content: '';
      display: inline-block; width: 4px; height: 1.1em;
      background: var(--c-gold); border-radius: 2px;
      margin-right: .6rem; vertical-align: middle; position: relative; top: -.05em;
    }

    /* ── H3 — sub-sections ── */
    .md-typeset h3 {
      font-size: 1rem !important; font-weight: 700 !important;
      color: var(--c-blue) !important;
      margin-top: 1.8rem !important; margin-bottom: .4rem !important;
    }

    /* ── H4 ── */
    .md-typeset h4 { font-size: .9rem !important; font-weight: 700 !important; color: var(--c-muted) !important; text-transform: uppercase; letter-spacing: .08em; margin-top: 1.2rem !important }

    /* ── Paragraphs ── */
    .md-typeset p { color: var(--c-muted) !important; line-height: 1.85 !important; font-size: 1rem !important; margin-bottom: .9rem !important }
    .md-typeset strong { color: var(--c-text) !important }
    .md-typeset em { color: var(--c-blue) !important; font-style: italic }
    .md-typeset a { color: var(--c-blue) !important; text-decoration: none !important }
    .md-typeset a:hover { text-decoration: underline !important }

    /* ── Author meta block (bold key: value lines at top) ── */
    .md-typeset p strong:first-child { color: var(--c-gold) !important }

    /* ── Portrait image (first image on page) ── */
    .md-typeset img {
      border-radius: var(--radius) !important;
      max-width: 100% !important;
    }
    /* Float portrait right on wide screens */
    .md-typeset p > img:first-of-type,
    .md-typeset > p:first-of-type img {
      float: right;
      max-width: 280px;
      margin: 0 0 1.5rem 2rem;
      border-radius: var(--radius) !important;
      border: 1px solid rgba(74,158,255,.2) !important;
      box-shadow: 0 0 40px rgba(74,158,255,.1);
    }

    /* ── Meta table (bold lines like **Birth:** ...) ── */
    /* Style the paragraph that contains only bold+plain pairs as a fact sheet */
    .md-typeset p:has(strong:first-child) {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-left: 3px solid var(--c-gold);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 1rem 1.2rem !important;
      font-size: .88rem !important;
      line-height: 1.9 !important;
      margin-bottom: 1.5rem !important;
    }

    /* ── Lists ── */
    .md-typeset ul li, .md-typeset ol li { color: var(--c-muted) !important; margin-bottom: .3rem !important }
    .md-typeset ul li::marker { color: var(--c-gold) }
    .md-typeset ol li::marker { color: var(--c-blue) }

    /* Bibliography items — year in gold */
    .md-typeset ul li > strong:first-child,
    .md-typeset ol li > strong:first-child { color: var(--c-gold) !important }

    /* ── Blockquotes ── */
    .md-typeset blockquote {
      border-left: 3px solid var(--c-blue) !important;
      background: rgba(74,158,255,.06) !important;
      border-radius: 0 var(--radius) var(--radius) 0 !important;
      padding: 1rem 1.4rem !important; margin: 1.5rem 0 !important;
      font-style: italic !important;
    }
    .md-typeset blockquote p { color: var(--c-muted) !important; margin-bottom: .4rem !important }

    /* ── Horizontal rule ── */
    .md-typeset hr { border: none !important; border-top: 1px solid var(--c-border) !important; margin: 2.5rem 0 !important; clear: both }

    /* ── Code ── */
    .md-typeset code { background: rgba(74,158,255,.1) !important; color: var(--c-blue) !important; border-radius: 4px !important; padding: .1em .35em !important }

    /* ── Footer ── */
    .md-footer { background: rgba(5,5,15,.98) !important; border-top: 1px solid var(--c-border) !important }
    .md-footer-meta { background: transparent !important }
    .md-footer__link { color: var(--c-muted) !important }
    .md-footer__link:hover { color: var(--c-blue) !important }
    .md-footer__title { color: var(--c-text) !important }

    /* ── Scrollbar ── */
    * { scrollbar-color: rgba(74,158,255,.25) transparent; scrollbar-width: thin }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .md-typeset p > img:first-of-type { float: none; max-width: 100%; margin: 0 0 1.2rem }
    }
  </style>

{% endblock %}
