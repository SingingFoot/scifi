# Project information
site_name: Ukrainian Sci-Fi
site_url: https://sci-fi-ua.netlify.app/
site_author: Oleh Shynkarenko
site_description: >-
  Ukrainian science fiction literature — past, present, and future.
  Research by Oleh Shynkarenko: PhD candidate, writer, journalist from Ukraine.
  Articles, books, authors, and academic work on Ukrainian sci-fi.

# Repository
repo_name: SingingFoot
repo_url: https://github.com/SingingFoot/scifi

# Copyright
copyright: Copyright &copy; 2025 Oleh Shynkarenko

# Configuration
theme:
  logo: assets/logo.png
  name: material
  custom_dir: material/overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - header.autohide
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: assets/logo.png

# Plugins
plugins:
  - blog
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - meta

# Hooks
hooks:
  - material/overrides/hooks/shortcodes.py
  - material/overrides/hooks/translations.py

# Additional configuration
extra:
  status:
    new: Recently added
    deprecated: Deprecated
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SingingFoot
      name: Oleh Shynkarenko on GitHub
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/OlehShynkarenko
      name: Oleh Shynkarenko on X
    - icon: fontawesome/solid/graduation-cap
      link: https://scholar.google.com/citations?hl=en&user=1yCMKj4AAAAJ
      name: Google Scholar
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0009-0001-1690-8967
      name: ORCID
    - icon: fontawesome/solid/book
      link: https://www.researchgate.net/profile/Oleh-Shynkarenko
      name: ResearchGate

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Home: index.md
  - About me:
    - Bio: bio.md
  - My PhD:
    - phd/index.md
    - Science Fiction in Ukraine (part I): phd/ukrainian-sf-part-1.md
    - Science Fiction in Ukraine (part II): phd/ukrainian-sf-part-2.md
    - MT 180: phd/mt-180-thesis.md
    - Sandro Kasyanyuk: phd/kasyanyuk-techno-communism.md
  - Authors:
    - authors/index.md
    - Sandro Kasyanyuk: authors/sandro-kasyanyuk.md
    - Vasyl Berezhnyi: authors/vasyl-berezhnyi.md
    - Volodymyr Zayets: authors/volodymyr-zayets.md
    - Viktor Pologyj: authors/viktor-pologyj.md
  
  - My Articles:
    - About my articles:
      - articles/index.md
      - Metamodernism Manifesto: articles/manifesto.md
      - The Faces of War: articles/faces-of-war.md
      - Struggle for reality: articles/struggle-for-reality.md
      - Metamodern oscillation: articles/metamodern-oscillation-ostrykov.md
      - Portrait of a Russian Intellectual as a Crocodile: articles/portrait.md
      - "Metamodern Timescapes: The Changing Image of Time": articles/timescapes.md
  - My Books:
    - How to disappear completely: books/yak.md
    - Kaharlyk: books/kaharlyk.md
    - The First Ukrainian Robots: books/robots.md
    - Cherep: books/cherep.md
    - Bandera Distortion: books/bandera.md
